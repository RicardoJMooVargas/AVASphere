name: vyaa_central_infor_webflutter
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  shared_preferences: ^2.1.1
  http: ^1.5.0
  flutter_svg: ^2.0.7
  get: ^4.7.2
  flutter_side_menu: ^0.5.41
  flutter_spinkit: ^5.2.2
  # Hive Database (compatible con web)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Path provider para Hive
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Hive Code Generation
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/svg/
    - assets/backgrounds/
flutter_launcher_icons:
  web:
    generate: true
  image_path: "assets/icons/vyaa-solo-icon.png"
  adaptive_icon_background: "#ffffff"
